<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Background -->
  <rect width="128" height="128" rx="16" fill="#1e1e2e"/>

  <!-- Text lines (code editor feel) -->
  <!-- Line 1 -->
  <rect x="14" y="18" width="28" height="5" rx="2.5" fill="#45475a"/>
  <rect x="46" y="18" width="42" height="5" rx="2.5" fill="#313244"/>
  <!-- Line 2 -->
  <rect x="14" y="28" width="18" height="5" rx="2.5" fill="#45475a"/>
  <rect x="36" y="28" width="56" height="5" rx="2.5" fill="#313244"/>
  <!-- Line 3 (highlighted / current) -->
  <rect x="14" y="38" width="100" height="7" rx="3" fill="#313244" opacity="0.8"/>
  <rect x="14" y="39.5" width="34" height="4" rx="2" fill="#89b4fa" opacity="0.7"/>
  <rect x="52" y="39.5" width="22" height="4" rx="2" fill="#a6e3a1" opacity="0.6"/>
  <!-- Line 4 -->
  <rect x="22" y="50" width="46" height="5" rx="2.5" fill="#45475a"/>
  <rect x="72" y="50" width="20" height="5" rx="2.5" fill="#313244"/>
  <!-- Line 5 -->
  <rect x="22" y="60" width="30" height="5" rx="2.5" fill="#313244"/>
  <rect x="56" y="60" width="50" height="5" rx="2.5" fill="#45475a"/>
  <!-- Line 6 -->
  <rect x="14" y="70" width="52" height="5" rx="2.5" fill="#45475a"/>
  <rect x="70" y="70" width="28" height="5" rx="2.5" fill="#313244"/>

  <!-- Divider -->
  <line x1="14" y1="82" x2="114" y2="82" stroke="#45475a" stroke-width="1" opacity="0.5"/>

  <!-- Tree section -->
  <!-- Edges -->
  <line x1="44" y1="98" x2="28" y2="116" stroke="#585b70" stroke-width="2" stroke-linecap="round"/>
  <line x1="44" y1="98" x2="62" y2="116" stroke="#585b70" stroke-width="2" stroke-linecap="round"/>
  <line x1="84" y1="98" x2="100" y2="116" stroke="#585b70" stroke-width="2" stroke-linecap="round"/>
  <!-- Root edges -->
  <line x1="64" y1="91" x2="44" y2="102" stroke="#585b70" stroke-width="2" stroke-linecap="round"/>
  <line x1="64" y1="91" x2="84" y2="102" stroke="#585b70" stroke-width="2" stroke-linecap="round"/>
  <!-- DAG merge -->
  <line x1="62" y1="116" x2="84" y2="98" stroke="#585b70" stroke-width="1.5" stroke-dasharray="3,2" stroke-linecap="round" opacity="0.5"/>

  <!-- Nodes -->
  <circle cx="64" cy="90" r="7" fill="#cba6f7"/>
  <!-- current node -->
  <circle cx="44" cy="102" r="6.5" fill="#89dceb"/>
  <circle cx="44" cy="102" r="4" fill="#1e1e2e"/>
  <circle cx="44" cy="102" r="2" fill="#89dceb"/>

  <circle cx="84" cy="102" r="5.5" fill="#585b70"/>
  <circle cx="28" cy="116" r="5" fill="#585b70"/>
  <circle cx="62" cy="116" r="5" fill="#a6e3a1"/>
  <circle cx="100" cy="116" r="5" fill="#585b70"/>

  <!-- Undo arrow -->
  <path d="M 108 92 A 8 8 0 1 1 116 92" stroke="#f38ba8" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <polygon points="116,92 112,88 120,88" fill="#f38ba8"/>
</svg>
